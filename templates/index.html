<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТурСобытия AI</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        #onboarding, #interests-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .onboard-slide { text-align: center; }
        .onboard-slide h2 { margin: 20px 0; }
        .onboard-slide img { width: 150px; margin: 20px; }
        .btn { background: #2e7d32; color: white; border: none; padding: 12px 24px; border-radius: 25px; font-size: 1em; cursor: pointer; margin-top: 20px; }
        .btn-outline { background: transparent; border: 2px solid #2e7d32; color: #2e7d32; }
        .tag { display: inline-block; padding: 8px 16px; margin: 6px; background: #e8f5e9; border-radius: 20px; cursor: pointer; }
        .tag.selected { background: #2e7d32; color: white; }
        #main-app { flex: 1; display: flex; flex-direction: column; }
        #header { background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
        #filters { padding: 10px; background: white; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; border-bottom: 1px solid #ddd; }
        #filters input, #filters select { flex: 1 1 130px; padding: 10px; border: 1px solid #ccc; border-radius: 20px; font-size: 0.9em; }
        #list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .event-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: 0.2s; position: relative; border-left: 5px solid #ccc; }
        .event-card.type-еда { border-left-color: #ff9800; }
        .event-card.type-культура { border-left-color: #9c27b0; }
        .event-card.type-спорт { border-left-color: #4caf50; }
        .event-card.type-дети { border-left-color: #ffc107; }
        .event-card h3 { margin-bottom: 5px; display: flex; justify-content: space-between; align-items: start; font-size: 1.1em; }
        .event-card .meta { font-size: 0.8em; color: #555; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 0.7em; display: inline-block; color: white; }
        .like-btn { background: none; border: none; font-size: 1.5em; cursor: pointer; }
        .like-btn.liked { animation: heartPop 0.3s; color: red; }
        @keyframes heartPop { 0%{transform: scale(1);} 50%{transform: scale(1.3);} 100%{transform: scale(1);} }
        .attend-btn { background: #e8f5e9; border: none; padding: 5px 10px; border-radius: 12px; font-size: 0.8em; cursor: pointer; }
        #map-container { height: 300px; flex-shrink: 0; }
        #map { width: 100%; height: 100%; }
        #ai-btn, #plan-btn { background: #ff9800; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5em; position: fixed; bottom: 20px; right: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        #plan-btn { right: 80px; background: #2196F3; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 20px; max-height: 80%; overflow-y: auto; }
        .close-btn { float: right; background: none; border: none; font-size: 1.5em; cursor: pointer; }
        #chat-widget { position: fixed; bottom: 80px; right: 20px; width: 300px; max-height: 400px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 1500; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; min-height: 200px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        #chat-input { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 8px 12px; }
        .offline-indicator { background: #f44336; color: white; text-align: center; padding: 5px; display: none; }
    </style>
</head>
<body>
    <!-- Онбординг -->
    <div id="onboarding">
        <div class="onboard-slide" id="slide1">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%232e7d32'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='white' font-size='24'%3E🗺️%3C/text%3E%3C/svg%3E" alt="">
            <h2>Находите события рядом</h2>
            <p>Все мероприятия вашего региона в одном приложении</p>
            <button class="btn" onclick="nextSlide(2)">Далее</button>
        </div>
        <div class="onboard-slide" id="slide2" style="display:none">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23ff9800'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='white' font-size='24'%3E🤖%3C/text%3E%3C/svg%3E" alt="">
            <h2>AI подберёт лучшее</h2>
            <p>Нейросеть изучит ваши вкусы и порекомендует события</p>
            <button class="btn" onclick="nextSlide(3)">Далее</button>
        </div>
        <div class="onboard-slide" id="slide3" style="display:none">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%234caf50'/%3E%3Ctext x='50' y='55' text-anchor='middle' fill='white' font-size='24'%3E📶%3C/text%3E%3C/svg%3E" alt="">
            <h2>Работает даже офлайн</h2>
            <p>Скачайте карты заранее и пользуйтесь без интернета</p>
            <button class="btn" onclick="finishOnboarding()">Начать!</button>
        </div>
    </div>
    <!-- Выбор интересов -->
    <div id="interests-screen" style="display:none">
        <h2>Что вам интересно?</h2>
        <div id="interests-tags"></div>
        <button class="btn" onclick="saveInterests()">Сохранить</button>
        <button class="btn btn-outline" onclick="skipInterests()">Пропустить</button>
    </div>
    <!-- Основное приложение -->
    <div id="main-app">
        <div id="offline-indicator" class="offline-indicator">Офлайн-режим</div>
        <div id="header">
            <span>🌍 ТурСобытия AI</span>
            <span id="profile-btn" style="cursor:pointer">👤</span>
        </div>
        <div id="filters">
            <input type="text" id="search" placeholder="🔍 Поиск...">
            <input type="date" id="date_from">
            <input type="date" id="date_to">
            <select id="type">
                <option value="all">Все типы</option>
                <option value="культура">Культура</option>
                <option value="спорт">Спорт</option>
                <option value="еда">Еда</option>
                <option value="дети">Дети</option>
            </select>
        </div>
        <div id="list-container"></div>
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>
    <!-- Кнопки AI -->
    <button id="ai-btn" onclick="openRecommendations()" title="AI рекомендации">🤖</button>
    <button id="plan-btn" onclick="openPlanModal()" title="План на день">📅</button>
    <!-- Модальные окна -->
    <div id="rec-modal" class="modal" style="display:none"><div class="modal-content" id="rec-content"></div></div>
    <div id="plan-modal" class="modal" style="display:none"><div class="modal-content" id="plan-content"></div></div>
    <!-- Чат-бот -->
    <div id="chat-widget">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Спросите меня...">
            <button class="btn" onclick="sendChat()" style="margin-left:5px; padding:8px 12px;">➤</button>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Инициализация
        const userId = localStorage.getItem('userId') || 'user_' + Date.now();
        localStorage.setItem('userId', userId);
        let currentEvents = [];

        // Онбординг
        function nextSlide(num) {
            document.getElementById('slide1').style.display = 'none';
            document.getElementById('slide2').style.display = 'none';
            document.getElementById('slide3').style.display = 'none';
            document.getElementById('slide' + num).style.display = 'block';
        }
        function finishOnboarding() {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('interests-screen').style.display = 'flex';
            // подготовить теги
            const tags = ['еда', 'культура', 'спорт', 'дети'];
            const container = document.getElementById('interests-tags');
            tags.forEach(t => {
                const el = document.createElement('span');
                el.className = 'tag';
                el.textContent = t;
                el.onclick = () => el.classList.toggle('selected');
                container.appendChild(el);
            });
            document.getElementById('main-app').style.display = 'flex';
        }
        function skipInterests() {
            document.getElementById('interests-screen').style.display = 'none';
        }
        async function saveInterests() {
            const selected = [...document.querySelectorAll('.tag.selected')].map(t => t.textContent).join(',');
            await fetch('/api/interests', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, interests: selected})
            });
            document.getElementById('interests-screen').style.display = 'none';
        }

        // Карта
        const map = L.map('map').setView([55.751244, 37.618423], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(map);
        const markersLayer = L.layerGroup().addTo(map);

        // Загрузка событий
        async function loadEvents() {
            const params = new URLSearchParams({
                search: document.getElementById('search').value,
                date_from: document.getElementById('date_from').value,
                date_to: document.getElementById('date_to').value,
                type: document.getElementById('type').value
            });
            try {
                const resp = await fetch('/api/events?' + params);
                currentEvents = await resp.json();
                renderList(currentEvents);
                renderMarkers(currentEvents);
            } catch(e) { /* офлайн */ }
        }
        function renderList(events) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            events.forEach(ev => {
                const card = document.createElement('div');
                card.className = `event-card type-${ev.type}`;
                card.innerHTML = `
                    <span class="like-btn" data-id="${ev.id}">🤍</span>
                    <h3>${ev.title} <span class="badge" style="background:#2196F3">${ev.type}</span></h3>
                    <div class="meta">
                        <span>📅 ${ev.date} ${ev.time}</span>
                        <span>📍 ${ev.location}</span>
                        <span>💰 ${ev.price}</span>
                    </div>
                    <button class="attend-btn" data-id="${ev.id}">Пойду 👍</button>
                    <span class="attendees-count" id="count-${ev.id}"></span>
                `;
                container.appendChild(card);
                // лайк
                card.querySelector('.like-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const btn = e.target;
                    await fetch('/api/like', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({user_id: userId, event_id: ev.id})
                    });
                    btn.classList.add('liked');
                    setTimeout(() => btn.classList.remove('liked'), 300);
                    btn.textContent = '❤️';
                });
                // отметка "Пойду"
                card.querySelector('.attend-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    await fetch('/api/attend', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({user_id: userId, event_id: ev.id})
                    });
                    loadAttendees(ev.id);
                });
                card.addEventListener('click', () => map.setView([ev.lat, ev.lon], 15));
                loadAttendees(ev.id);
            });
        }
        async function loadAttendees(eventId) {
            const resp = await fetch(`/api/event/${eventId}/attendees`);
            const data = await resp.json();
            document.getElementById(`count-${eventId}`).textContent = data.count ? ` (${data.count})` : '';
        }
        function renderMarkers(events) {
            markersLayer.clearLayers();
            events.forEach(ev => L.marker([ev.lat, ev.lon]).addTo(markersLayer).bindPopup(`<b>${ev.title}</b><br>${ev.date} ${ev.time}`));
        }

        // AI Рекомендации
        async function openRecommendations() {
            document.getElementById('rec-modal').style.display = 'flex';
            document.getElementById('rec-content').innerHTML = '<p>Загрузка...</p>';
            const resp = await fetch(`/api/ai/recommendations?user_id=${userId}`);
            const recs = await resp.json();
            const html = recs.map(r => `
                <div class="event-card type-${r.type}" onclick="map.setView([${r.lat},${r.lon}],15);document.getElementById('rec-modal').style.display='none'">
                    <strong>${r.title}</strong> <span class="badge">${r.type}</span><br>
                    <small>${r.date} ${r.time} | ${r.location}</small>
                    ${r.reason ? `<div style="color:#e65100; font-style:italic;">💡 ${r.reason}</div>` : ''}
                </div>
            `).join('');
            document.getElementById('rec-content').innerHTML = html || 'Нет рекомендаций. Поставьте лайки событиям.';
        }

        // План на день
        async function openPlanModal() {
            document.getElementById('plan-modal').style.display = 'flex';
            document.getElementById('plan-content').innerHTML = '<p>Составляем план...</p>';
            navigator.geolocation.getCurrentPosition(async pos => {
                const resp = await fetch('/api/ai/plan', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({user_id:userId, lat:pos.coords.latitude, lon:pos.coords.longitude})
                });
                const data = await resp.json();
                document.getElementById('plan-content').innerHTML = `<p>${data.plan}</p>`;
            }, () => {
                document.getElementById('plan-content').innerHTML = 'Не удалось получить геолокацию.';
            });
        }

        // Чат-бот
        document.getElementById('ai-btn').addEventListener('dblclick', () => {
            document.getElementById('chat-widget').style.display = 'flex';
        });
        async function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML += `<div style="text-align:right; margin:5px"><b>Вы:</b> ${msg}</div>`;
            input.value = '';
            chatMessages.innerHTML += `<div style="text-align:left; margin:5px"><i>AI печатает...</i></div>`;
            const resp = await fetch('/api/ai/chat', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({user_id: userId, message: msg})
            });
            const data = await resp.json();
            chatMessages.removeChild(chatMessages.lastChild);
            chatMessages.innerHTML += `<div style="text-align:left; margin:5px"><b>🤖 AI:</b> ${data.reply}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Push-уведомления
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        function notify(title, body) {
            if (Notification.permission === 'granted') new Notification(title, {body});
        }

        // Бейджи
        async function showBadges() {
            const resp = await fetch('/api/badges/' + userId);
            const badges = await resp.json();
            alert('Ваши бейджи: ' + (badges.join(', ') || 'пока нет'));
        }
        document.getElementById('profile-btn').onclick = showBadges;

        // Офлайн-индикатор
        window.addEventListener('online', () => document.getElementById('offline-indicator').style.display = 'none');
        window.addEventListener('offline', () => document.getElementById('offline-indicator').style.display = 'block');

        // Фильтры
        ['search','date_from','date_to','type'].forEach(id => document.getElementById(id).addEventListener('input', loadEvents));
        // Закрытие модалок
        document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; }));

        // Старт
        if (!localStorage.getItem('onboarded')) {
            document.getElementById('main-app').style.display = 'none';
        } else {
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('interests-screen').style.display = 'none';
        }
        loadEvents();
    </script>
</body>
</html>
